        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-blur {
            backdrop-filter: blur(12px);
            background: rgba(247, 249, 251, 0.85);
        }

<body class="bg-surface min-h-screen flex items-center justify-center p-4">
<!-- Blurred Background Mockup (The App Extension Shell) -->
<div class="w-full max-w-md h-[600px] bg-surface-container-lowest shadow-2xl overflow-hidden relative border border-outline-variant/10 rounded-lg filter blur-[4px] pointer-events-none">
<!-- Mock TopNavBar -->
<header class="flex justify-between items-center px-4 py-3 w-full bg-white">
<span class="text-xl font-bold tracking-tighter text-blue-900">CarCheck</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-slate-500">settings</span>
<span class="material-symbols-outlined text-slate-500">history</span>
</div>
</header>
<!-- Mock Content -->
<main class="p-6 space-y-6">
<div class="h-48 w-full bg-surface-container-low rounded flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-surface-variant">directions_car</span>
</div>
<div class="space-y-3">
<div class="h-4 w-3/4 bg-surface-container-high rounded"></div>
<div class="h-4 w-1/2 bg-surface-container-high rounded"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-24 bg-surface-container rounded"></div>
<div class="h-24 bg-surface-container rounded"></div>
</div>
</main>
</div>
<!-- Onboarding Overlay -->
<div class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-on-background/20 backdrop-blur-[2px]">
<!-- The Floating Tooltip Tooltip -->
<div class="relative w-full max-w-[340px] bg-surface-container-lowest shadow-2xl border border-outline-variant/20 rounded-lg p-6 flex flex-col gap-6">
<!-- Step Indicators -->
<div class="flex items-center gap-1.5">
<div class="h-1 w-8 bg-primary rounded-full"></div>
<div class="h-1 w-8 bg-surface-variant rounded-full"></div>
<div class="h-1 w-8 bg-surface-variant rounded-full"></div>
<span class="ml-2 text-[10px] font-bold uppercase tracking-widest text-primary font-label">Step 1 of 3</span>
</div>
<!-- Content -->
<div class="space-y-2">
<h3 class="text-lg font-bold text-on-surface tracking-tight font-headline">CarCheck is ready</h3>
<p class="text-body-md text-on-surface-variant leading-relaxed font-body">
                    Your diagnostic engine is synchronized and connected to live vehicle databases.
                </p>
</div>
<!-- Image/Visual Metadata Representation -->
<div class="w-full h-32 bg-surface-container-low rounded-lg overflow-hidden border border-outline-variant/10">
<img class="w-full h-full object-cover mix-blend-multiply opacity-80" data-alt="Technical dashboard showing vehicle telemetry data with glowing blue lines and precision diagnostic metrics on a dark interface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-zhM7s7q7OW_z1MSIy2-g58NLtahGkIAaNxEIhtk2OoRY3pqD69jVPp0hehTdgygM-31vwYigLBUZIqE3x53S_DzqCNOUNiCiyYzj3wkqmlKgK_f3swAecIsGPRGH139UGryiGFoiMFsj3P70g_NdaNLSIMWhADwb_idFTxjOYASQZejJkQP-ZP_tEkcAnIT0wM083EHyxbQEpvguFsXRMyFIr9CVdEj8ZDUGUHsMW6ZcOqOq1PXThpEbORygVyF9usax0wzR-IM"/>
</div>
<!-- Action -->
<div class="flex items-center justify-between pt-2">
<button class="text-sm font-semibold text-on-surface-variant hover:text-on-surface transition-colors">Skip tour</button>
<button class="bg-primary text-on-primary px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm hover:bg-primary-container transition-all active:opacity-80">
                    Next
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
<!-- Precision "Anchor" Tip (Visual Decoration) -->
<div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-surface-container-lowest rotate-45 border-r border-b border-outline-variant/20"></div>
</div>
<!-- Target Anchor Point (The "Synchronized" Indicator) -->
<div class="mt-12 relative">
<div class="w-4 h-4 bg-primary rounded-full animate-ping absolute inset-0"></div>
<div class="w-4 h-4 bg-primary rounded-full border-2 border-white relative z-10"></div>
</div>
</div>
<!-- SideNavBar (Hidden for Transactional/Focused State as per mandate) -->
<!-- The mandate: "suppress the navigation shell if the page intent is: Linear/Transactional: Login, Sign-up, Onboarding..." -->
</body></html>
